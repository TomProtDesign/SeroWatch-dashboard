<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SeroWatch Browser</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root { --primary-color: #2c3e50; --bg-color: #ffffff; --panel-bg: #f8f9fa; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; background-color: var(--bg-color); color: var(--primary-color); }
        
        .header { padding: 40px 20px 20px 20px; text-align: center; border-bottom: 1px solid #eee; }
        .header h1 { margin: 0; font-weight: 300; font-size: 2.5em; letter-spacing: -1px; }
        .header p { margin: 10px 0 0; color: #7f8c8d; font-size: 1.1em; font-weight: 300; }

        .container { display: flex; flex-direction: column; max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        .filter-panel { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); 
            gap: 20px; 
            background: var(--panel-bg); 
            padding: 25px; 
            border-radius: 4px; 
            border: 1px solid #e1e4e8;
            margin-bottom: 30px;
        }

        .filter-group { display: flex; flex-direction: column; }
        label { font-size: 0.75rem; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; color: #95a5a6; margin-bottom: 8px; }
        select { 
            padding: 8px; border-radius: 4px; border: 1px solid #d1d5da; background: white; 
            font-size: 0.9rem; color: #24292e; outline: none; transition: border 0.2s;
        }
        select:focus { border-color: #0366d6; }

        #plot { width: 100%; height: 700px; }
        .footer { text-align: center; padding: 40px; color: #bdc3c7; font-size: 0.8em; font-weight: 300; }
        #counter { font-size: 0.85em; margin-top: 10px; color: #7f8c8d; text-align: right; }
    </style>
</head>
<body>

<div class="header">
    <h1>SeroWatch Antibody Plot Browser</h1>
    <p>Serological profile of 3000 samples for Respiratory Infection</p>
</div>

<div class="container">
    <div class="filter-panel">
        <div class="filter-group"><label>X-Axis</label><select id="x-axis"></select></div>
        <div class="filter-group"><label>Y-Axis</label><select id="y-axis"></select></div>
        <div class="filter-group"><label>Department</label><select id="f-dept"><option value="All">All Regions</option></select></div>
        <div class="filter-group"><label>Sex</label><select id="f-sexe"><option value="All">All Sexes</option></select></div>
        <div class="filter-group"><label>Age Group</label><select id="f-age"><option value="All">All Ages</option></select></div>
        <div class="filter-group"><label>Color By</label><select id="color-by">
            <option value="DEPARTMENT OF SAMPLING">Department</option>
            <option value="SEXE">Sex</option>
            <option value="age_group">Age Group</option>
        </select></div>
    </div>

    <div id="counter">Loading data...</div>
    <div id="plot"></div>
</div>

<div class="footer">
    &copy; 2024 SeroWatch Project | Data source: SeroWatch_ARI_W38Y24_data.csv
</div>

<script>
    // --- 1. CONFIGURATION: ENTER YOUR CUT-OFF VALUES HERE ---
    const CUTOFFS = {
        'NP-FLU_IgM': [37200, 62100],
        'NP-FLU_IgA': [5500, 10200],
        'NP-FLU_IgG': 40000,
        'NP-COV_IgM': [31400, 57100],
        'NP-COV_IgA': [5200, 8100],
        'NP-COV_IgG': 40000,
        'NP-RSV_IgM': [36400, 68700],
        'NP-RSV_IgA': [4300, 7800],
        'NP-RSV_IgG': 40000
        // No cutoff for Avidity
    };

    let rawData = [];
    const CSV_FILE = "SeroWatch_ARI_W38Y24_data.csv";

    d3.csv(CSV_FILE).then(data => {
        data.forEach(d => {
            Object.keys(d).forEach(key => {
                if (!isNaN(d[key]) && d[key] !== "") d[key] = +d[key];
            });
            const start = Math.floor(d.AGE / 10) * 10;
            d.age_group = `${start}-${start + 9} y.o.`;
        });
        rawData = data;
        setupSelectors();
        draw();
    });

    function setupSelectors() {
        const measures = Object.keys(rawData[0]).filter(k => 
            !['N°INCLUSION', 'SEXE', 'DEPARTMENT OF SAMPLING', 'AGE', 'age_group'].includes(k)
        );

        const fill = (id, options) => {
            const s = document.getElementById(id);
            options.forEach(o => s.add(new Option(o, o)));
        };

        fill('x-axis', measures);
        fill('y-axis', measures);
        document.getElementById('y-axis').selectedIndex = 2; // Default to IgG

        fill('f-dept', [...new Set(rawData.map(d => d['DEPARTMENT OF SAMPLING']))].sort());
        fill('f-sexe', [...new Set(rawData.map(d => d.SEXE))].sort());
        fill('f-age', [...new Set(rawData.map(d => d.age_group))].sort((a,b) => parseInt(a)-parseInt(b)));

        document.querySelectorAll('select').forEach(s => s.addEventListener('change', draw));
    }

    function draw() {
        const conf = {
            x: document.getElementById('x-axis').value,
            y: document.getElementById('y-axis').value,
            dept: document.getElementById('f-dept').value,
            sexe: document.getElementById('f-sexe').value,
            age: document.getElementById('f-age').value,
            color: document.getElementById('color-by').value
        };

        const filtered = rawData.filter(d => 
            (conf.dept === 'All' || d['DEPARTMENT OF SAMPLING'] == conf.dept) &&
            (conf.sexe === 'All' || d.SEXE === conf.sexe) &&
            (conf.age === 'All' || d.age_group === conf.age)
        );

        document.getElementById('counter').innerText = `Displaying ${filtered.length} of ${rawData.length} samples`;

        const groups = [...new Set(filtered.map(d => d[conf.color]))].sort();
        const traces = groups.map(g => {
            const sub = filtered.filter(d => d[conf.color] === g);
            return {
                x: sub.map(d => d[conf.x]),
                y: sub.map(d => d[conf.y]),
                name: String(g),
                mode: 'markers',
                type: 'scatter',
                marker: { size: 7, opacity: 0.5, line: {width: 0.5, color: 'white'} },
                text: sub.map(d => `ID: ${d['N°INCLUSION']}<br>Age: ${d.AGE}<br>Sex: ${d.SEXE}`)
            };
        });

        // SHAPES (Cut-off lines)
        const shapes = [];
        
        function addShape(axis, value) {
            const isX = (axis === 'x');
            if (!value) return;
        
            if (Array.isArray(value)) {
                // Draw a SHADED RECTANGLE for Gray Zones
                shapes.push({
                    type: 'rect',
                    x0: isX ? value[0] : 0,
                    x1: isX ? value[1] : 1,
                    y0: isX ? 0 : value[0],
                    y1: isX ? 1 : value[1],
                    xref: isX ? 'x' : 'paper',
                    yref: isX ? 'paper' : 'y',
                    fillcolor: '#e0e0e0', // Light gray
                    opacity: 0.4,         // Transparent
                    line: { width: 0 }    // No border
                });
            } else {
                // Draw a SINGLE DASHED LINE for fixed thresholds
                shapes.push({
                    type: 'line',
                    x0: isX ? value : 0,
                    x1: isX ? value : 1,
                    y0: isX ? 0 : value,
                    y1: isX ? 1 : value,
                    xref: isX ? 'x' : 'paper',
                    yref: isX ? 'paper' : 'y',
                    line: { color: '#bdc3c7', width: 1.5, dash: 'dash' }
                });
            }
        }
        
        addShape('x', CUTOFFS[conf.x]);
        addShape('y', CUTOFFS[conf.y]);

        const layout = {
            template: 'plotly_white',
            xaxis: { title: { text: conf.x, font: { size: 12, color: '#7f8c8d' } }, gridcolor: '#f0f0f0', zeroline: false },
            yaxis: { title: { text: conf.y, font: { size: 12, color: '#7f8c8d' } }, gridcolor: '#f0f0f0', zeroline: false },
            margin: { t: 40, r: 20, b: 80, l: 80 },
            hovermode: 'closest',
            showlegend: true,
            legend: { orientation: 'h', y: -0.15, x: 0.5, xanchor: 'center' },
            shapes: shapes
        };

        Plotly.newPlot('plot', traces, layout, {responsive: true, displayModeBar: true});
    }
</script>
</body>
</html>
