<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorateur de Sérologie</title>
    
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 20px; background-color: #f8f9fa;}
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .controls { display: flex; gap: 20px; margin-bottom: 20px; padding: 15px; background: #e9ecef; border-radius: 6px;}
        .control-group { display: flex; flex-direction: column; flex: 1;}
        label { font-weight: bold; margin-bottom: 5px; }
        select { padding: 8px; border-radius: 4px; border: 1px solid #ccc; font-size: 16px; }
        #plot { width: 100%; height: 600px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Explorateur de données d'Anticorps 🦠</h1>
    <p>Sélectionnez les antigènes et les mesures à comparer sur les axes X et Y.</p>

    <div class="controls">
        <div class="control-group">
            <label for="x-axis">Axe X :</label>
            <select id="x-axis"></select>
        </div>
        <div class="control-group">
            <label for="y-axis">Axe Y :</label>
            <select id="y-axis"></select>
        </div>
    </div>

    <div id="plot"></div>
</div>

<script>
    // 1. Vos données de sérologie (formatées en JavaScript)
    // Plus tard, vous pourrez charger un fichier CSV automatiquement, 
    // mais pour commencer, on met les données directement ici.
    const data = [
        { Patient: 'Patient_001', Ag1_IgG: 1.2, Ag1_IgM: 0.5, Ag2_IgG: 0.9, Ag2_Avidite: 45 },
        { Patient: 'Patient_002', Ag1_IgG: 0.8, Ag1_IgM: 1.1, Ag2_IgG: 0.7, Ag2_Avidite: 60 },
        { Patient: 'Patient_003', Ag1_IgG: 2.5, Ag1_IgM: 0.2, Ag2_IgG: 1.8, Ag2_Avidite: 85 },
        { Patient: 'Patient_004', Ag1_IgG: 0.4, Ag1_IgM: 2.0, Ag2_IgG: 0.6, Ag2_Avidite: 30 },
        { Patient: 'Patient_005', Ag1_IgG: 3.1, Ag1_IgM: 0.8, Ag2_IgG: 2.9, Ag2_Avidite: 92 }
    ];

    // 2. Extraire la liste des variables (tout sauf la colonne 'Patient')
    // Cela permet de créer les menus déroulants automatiquement
    const variables = Object.keys(data[0]).filter(key => key !== 'Patient');

    const xSelect = document.getElementById('x-axis');
    const ySelect = document.getElementById('y-axis');

    // 3. Remplir les menus déroulants avec les variables
    variables.forEach(variable => {
        xSelect.add(new Option(variable, variable));
        ySelect.add(new Option(variable, variable));
    });
    // Sélectionner une variable différente pour l'axe Y par défaut
    if (variables.length > 1) { ySelect.selectedIndex = 1; }

    // 4. Fonction principale pour dessiner ou mettre à jour le graphique
    function updatePlot() {
        const xVar = xSelect.value;
        const yVar = ySelect.value;

        // Préparation des points pour Plotly
        const trace = {
            x: data.map(row => row[xVar]), // Récupère toutes les valeurs de X
            y: data.map(row => row[yVar]), // Récupère toutes les valeurs de Y
            text: data.map(row => row.Patient), // Affiche le nom du patient au survol
            mode: 'markers',
            type: 'scatter',
            marker: { 
                size: 12, 
                opacity: 0.7, 
                color: '#2ca02c', // Couleur des points
                line: { width: 1, color: '#000' } 
            },
            hovertemplate: '<b>%{text}</b><br>X (%{xaxis.title.text}): %{x}<br>Y (%{yaxis.title.text}): %{y}<extra></extra>'
        };

        // Configuration visuelle du graphique
        const layout = {
            title: `Comparaison : ${xVar} vs ${yVar}`,
            xaxis: { title: xVar, zeroline: false },
            yaxis: { title: yVar, zeroline: false },
            hovermode: 'closest'
        };

        // Génération du graphique
        Plotly.newPlot('plot', [trace], layout);
    }

    // 5. Écouter les changements dans les menus déroulants
    // Dès qu'on change une option, la fonction updatePlot est relancée
    xSelect.addEventListener('change', updatePlot);
    ySelect.addEventListener('change', updatePlot);

    // 6. Dessiner le graphique une première fois au chargement de la page
    updatePlot();
</script>

</body>
</html>
